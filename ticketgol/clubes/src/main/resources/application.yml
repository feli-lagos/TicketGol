spring:
  application:
    name: servicio-clubes

  datasource:
    url: jdbc:mysql://localhost:3306/db_ticketgol_clubes?createDatabaseIfNotExist=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

server:
  port: 8110

logging:
  file:
    name: application.log

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://localhost:8761/eureka/