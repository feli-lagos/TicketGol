server.port=8102
usuario-service.url=http://localhost:8082/api/v1/usuarios

spring.datasource.url=jdbc:mysql://localhost:3306/db_ticketgol_pasestemporadas?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

spring.application.name=servicio-pasestemporadas
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.enabled=true