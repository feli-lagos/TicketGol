# Configuración para Entorno de Pruebas (Test)


server.port=8113
spring.datasource.url=jdbc:mysql://localhost:3306/db_ticketgol_compras_test?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# En pruebas se acostumbra limpiar la base de datos en cada ejecución (create-drop)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.application.name=servicio-compras
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.enabled=true